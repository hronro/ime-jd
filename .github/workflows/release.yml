name: Release

# Builds the same matrix as build-on-push.yml, but triggers on a version tag
# and uploads the packaged artifacts to a GitHub Release instead of the
# workflow's artifact storage.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

# Needed for `gh release create` / `gh release upload`.
permissions:
  contents: write

jobs:
  # Create (or reuse) the Release up front so the parallel build jobs can all
  # upload assets into it without racing to create it.
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          # The tag drives the asset filenames; core/build.zig.zon drives the
          # versions embedded in the binaries (Windows DLL, macOS pkg). Fail
          # fast if they disagree so a release can't ship mismatched versions.
          core_ver=$(sed -n 's/.*\.version[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' core/build.zig.zon | head -n1)
          if [ "$tag" != "v$core_ver" ]; then
            echo "Tag $tag does not match core/build.zig.zon version (expected v$core_ver)." >&2
            exit 1
          fi
          if gh release view "$tag" -R "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $tag already exists — reusing it."
          else
            gh release create "$tag" -R "${{ github.repository }}" \
              --title "$tag" \
              --generate-notes \
              --verify-tag
          fi

  # Zig cross-compiles every libjd target from one x86_64 Linux runner, so all
  # the lib packaging (incl. the Windows .zip) happens here in bash too.
  #   - non-Windows: a .tar.xz per linkage (libjd.so/.dylib and libjd.a),
  #     each bundling include/.
  #   - Windows: one .zip with the DLL, its import lib, the static lib, and
  #     include/ (jd.dll + jd.lib + jd_static.lib share the .lib/.dll space,
  #     so they ride together rather than being split by extension).
  # The intermediate upload-artifact is what the CLI/IME jobs consume.
  build-libs:
    name: libs ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            arch: x86_64
            zig_target: x86_64-linux
          - platform: linux
            arch: arm64
            zig_target: aarch64-linux
          - platform: macos
            arch: x86_64
            zig_target: x86_64-macos.12.0
          - platform: macos
            arch: arm64
            zig_target: aarch64-macos.12.0
          - platform: windows
            arch: x86_64
            zig_target: x86_64-windows-msvc
          - platform: windows
            arch: arm64
            zig_target: aarch64-windows-msvc
          # iOS device slice — consumed by build-ios to link the .ipa. (iOS only
          # produces a static lib; the simulator slice is a build-on-push concern.)
          - platform: ios
            arch: arm64
            zig_target: aarch64-ios.13.0
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build static + dynamic libraries
        working-directory: core
        run: zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.zig_target }}

      - name: Stage libjd bundle
        shell: bash
        run: |
          set -euo pipefail
          out="dist/libjd-${{ matrix.platform }}-${{ matrix.arch }}"
          mkdir -p "$out"
          # Keeps zig-out's lib/ + bin/ split (DLLs live in bin/ on Windows).
          cp -R core/zig-out/. "$out/"
          cp -R core/include "$out/include"

      - name: Upload libjd bundle (for CLI/IME jobs)
        uses: actions/upload-artifact@v7
        with:
          name: libjd-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/libjd-${{ matrix.platform }}-${{ matrix.arch }}
          if-no-files-found: error

      - name: Package release archives
        shell: bash
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME}"
          platform="${{ matrix.platform }}"
          arch="${{ matrix.arch }}"
          bundle="dist/libjd-$platform-$arch"
          out_dir="$PWD/release"
          mkdir -p "$out_dir"
          stage="$(mktemp -d)"
          cp -R "$bundle/include" "$stage/include"

          if [[ "$platform" == "windows" ]]; then
            cp "$bundle/bin/jd.dll" "$bundle/lib/jd.lib" "$bundle/lib/jd_static.lib" "$stage/"
            ( cd "$stage" && zip -r -9 -q "$out_dir/libjd-$ver-windows-$arch.zip" . )
          elif [[ "$platform" == "ios" ]]; then
            # iOS ships only the static lib (no dynamic lib for the App Store sandbox).
            cp "$bundle/lib/libjd.a" "$stage/"
            tar -cf - -C "$stage" libjd.a include | XZ_OPT=-e9 xz -c > "$out_dir/libjd-$ver-ios-$arch.a.tar.xz"
          else
            case "$platform" in
              linux) dyn="libjd.so";    dynext="so"    ;;
              macos) dyn="libjd.dylib"; dynext="dylib" ;;
            esac
            cp "$bundle/lib/$dyn" "$bundle/lib/libjd.a" "$stage/"
            # XZ_OPT=-e9 → xz extreme preset, level 9 (smallest output).
            tar -cf - -C "$stage" "$dyn"  include | XZ_OPT=-e9 xz -c > "$out_dir/libjd-$ver-$platform-$arch.$dynext.tar.xz"
            tar -cf - -C "$stage" libjd.a include | XZ_OPT=-e9 xz -c > "$out_dir/libjd-$ver-$platform-$arch.a.tar.xz"
          fi
          ls -l "$out_dir"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" -R "${{ github.repository }}" release/* --clobber

  # One CLI build per Rust target. Each downloads the matching prebuilt libs
  # and statically links libjd into jd-cli. Packaged as a .tar.xz (Unix) or
  # .zip (Windows). Linux gnu and musl variants ship as distinct assets.
  build-cli:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    needs: build-libs
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            platform: linux
            arch: x86_64
            suffix: -gnu
            os: linux
            use_cross: true
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            platform: linux
            arch: x86_64
            suffix: -musl
            os: linux
            use_cross: true
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            platform: linux
            arch: arm64
            suffix: -gnu
            os: linux
            use_cross: true
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            platform: linux
            arch: arm64
            suffix: -musl
            os: linux
            use_cross: true
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            platform: macos
            arch: x86_64
            os: macos
            use_cross: false
          - target: aarch64-apple-darwin
            runner: macos-15
            platform: macos
            arch: arm64
            os: macos
            use_cross: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            platform: windows
            arch: x86_64
            os: windows
            use_cross: false
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            platform: windows
            arch: arm64
            os: windows
            use_cross: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Download prebuilt libs
        uses: actions/download-artifact@v8
        with:
          name: libjd-${{ matrix.platform }}-${{ matrix.arch }}
          path: prebuilt-libs

      - name: Build CLI (cross)
        if: matrix.use_cross
        working-directory: cli
        env:
          LIBJD_PATH: ${{ github.workspace }}/prebuilt-libs/lib
        run: cross build --release --target ${{ matrix.target }}

      - name: Build CLI (cargo)
        if: ${{ !matrix.use_cross }}
        working-directory: cli
        env:
          LIBJD_PATH: ${{ github.workspace }}/prebuilt-libs/lib
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage CLI binary
        shell: bash
        run: |
          set -euo pipefail
          out="dist/jd-cli-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.suffix }}"
          mkdir -p "$out"
          if [[ "${{ matrix.os }}" == "windows" ]]; then
            cp cli/target/${{ matrix.target }}/release/jd-cli.exe "$out/"
          else
            cp cli/target/${{ matrix.target }}/release/jd-cli     "$out/"
          fi

      - name: Package release archive (Unix)
        if: matrix.os != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME}"
          stage="jd-cli-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.suffix }}"
          asset="jd-cli-$ver-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.suffix }}"
          mkdir -p release
          tar -cf - -C "dist/$stage" jd-cli | XZ_OPT=-e9 xz -c > "release/$asset.tar.xz"

      - name: Package release archive (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $ver = $env:GITHUB_REF_NAME
          $stage = "jd-cli-${{ matrix.platform }}-${{ matrix.arch }}"
          $asset = "jd-cli-$ver-${{ matrix.platform }}-${{ matrix.arch }}"
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive -Path "dist/$stage/jd-cli.exe" -DestinationPath "release/$asset.zip" -Force

      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" -R "${{ github.repository }}" release/* --clobber

  # One IME build per Windows Rust target. Shipped as a .zip containing the
  # IME DLL plus the register/unregister .bat helpers.
  build-windows-ime:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    needs: build-libs
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            arch: x86_64
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          targets: ${{ matrix.target }}

      - name: Download prebuilt libs
        uses: actions/download-artifact@v8
        with:
          name: libjd-windows-${{ matrix.arch }}
          path: prebuilt-libs

      - name: Build IME
        working-directory: windows
        env:
          LIBJD_PATH: ${{ github.workspace }}/prebuilt-libs/lib
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage IME bundle
        shell: bash
        run: |
          set -euo pipefail
          out="dist/jd-ime-windows-${{ matrix.arch }}"
          mkdir -p "$out"
          cp windows/target/${{ matrix.target }}/release/jd_ime.dll "$out/"
          cp windows/register.bat   "$out/"
          cp windows/unregister.bat "$out/"

      - name: Package release archive
        shell: pwsh
        run: |
          $ver = $env:GITHUB_REF_NAME
          $stage = "jd-ime-windows-${{ matrix.arch }}"
          $asset = "jd-ime-$ver-windows-${{ matrix.arch }}"
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive -Path "dist/$stage/*" -DestinationPath "release/$asset.zip" -Force

      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" -R "${{ github.repository }}" release/* --clobber

  # One IME build per macOS arch, built natively on its own runner. The .pkg
  # installer produced by build-pkg.sh is shipped directly.
  build-macos-ime:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    needs: build-libs
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-15
            arch: arm64
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            arch: x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Download prebuilt libs
        uses: actions/download-artifact@v8
        with:
          name: libjd-macos-${{ matrix.arch }}
          path: prebuilt-libs

      - name: Build .pkg installer
        working-directory: macos
        run: scripts/build-pkg.sh --libjd "${{ github.workspace }}/prebuilt-libs/lib/libjd.a"

      - name: Package release archive
        shell: bash
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME}"
          mkdir -p release
          # build-pkg.sh emits exactly one jd-ime-macos-<arch>.pkg.
          cp macos/build/pkg/*.pkg "release/jd-ime-$ver-macos-${{ matrix.arch }}.pkg"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" -R "${{ github.repository }}" release/* --clobber

  # The iOS app + keyboard extension, packaged as an UNSIGNED .ipa. Reuses the
  # prebuilt device libjd from build-libs (LIBJD_A, exactly like build-macos-ime).
  # The .ipa is unsigned (public CI has no Apple signing credentials), so users
  # install it with a sideloading tool (AltStore / Sideloadly / TrollStore) that
  # re-signs with their own Apple ID — not by double-clicking.
  build-ios:
    name: ios .ipa
    runs-on: macos-15
    needs: build-libs
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Download prebuilt libs
        uses: actions/download-artifact@v8
        with:
          name: libjd-ios-arm64
          path: prebuilt-libs

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Build unsigned app (device)
        working-directory: ios
        run: >
          xcodebuild build
          -project JdIME-iOS.xcodeproj -scheme JdIME-iOS
          -sdk iphoneos -configuration Release
          -derivedDataPath build/DD
          CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""
          LIBJD_A="${{ github.workspace }}/prebuilt-libs/lib/libjd.a"

      - name: Package unsigned .ipa
        shell: bash
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME}"
          app="ios/build/DD/Build/Products/Release-iphoneos/JdIME.app"
          mkdir -p release ipa/Payload
          cp -R "$app" ipa/Payload/
          ( cd ipa && zip -r -9 -q "$GITHUB_WORKSPACE/release/jd-ime-$ver-ios.ipa" Payload )

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" -R "${{ github.repository }}" release/* --clobber
