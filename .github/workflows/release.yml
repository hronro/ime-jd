name: Release

# Builds the same matrix as build-on-push.yml, but triggers on a version tag
# and uploads the packaged artifacts to a GitHub Release instead of the
# workflow's artifact storage.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

# Needed for `gh release create` / `gh release upload`.
permissions:
  contents: write

jobs:
  # Create (or reuse) the Release up front so the parallel build jobs can all
  # upload assets into it without racing to create it.
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          # The tag drives the asset filenames; core/build.zig.zon drives the
          # versions embedded in the binaries (Windows DLL, macOS pkg). Fail
          # fast if they disagree so a release can't ship mismatched versions.
          core_ver=$(sed -n 's/.*\.version[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' core/build.zig.zon | head -n1)
          if [ "$tag" != "v$core_ver" ]; then
            echo "Tag $tag does not match core/build.zig.zon version (expected v$core_ver)." >&2
            exit 1
          fi
          if gh release view "$tag" -R "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $tag already exists — reusing it."
          else
            gh release create "$tag" -R "${{ github.repository }}" \
              --title "$tag" \
              --generate-notes \
              --verify-tag
          fi

  # Zig cross-compiles every libjd target from one x86_64 Linux runner, so all
  # the lib packaging (incl. the Windows .zip) happens here in bash too.
  #   - non-Windows: a .tar.xz per linkage (libjd.so/.dylib and libjd.a),
  #     each bundling include/.
  #   - Windows: one .zip with the DLL, its import lib, the static lib, and
  #     include/ (jd.dll + jd.lib + jd_static.lib share the .lib/.dll space,
  #     so they ride together rather than being split by extension).
  # The intermediate upload-artifact is what the CLI/IME jobs consume.
  build-libs:
    name: libs ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            arch: x86_64
            zig_target: x86_64-linux
          - platform: linux
            arch: arm64
            zig_target: aarch64-linux
          - platform: macos
            arch: x86_64
            zig_target: x86_64-macos.12.0
          - platform: macos
            arch: arm64
            zig_target: aarch64-macos.12.0
          - platform: windows
            arch: x86_64
            zig_target: x86_64-windows-msvc
          - platform: windows
            arch: arm64
            zig_target: aarch64-windows-msvc
          # iOS device slice — consumed by build-ios to link the .ipa. (iOS only
          # produces a static lib; the simulator slice is a build-on-push concern.)
          - platform: ios
            arch: arm64
            zig_target: aarch64-ios.13.0
          # Android engine slices, consumed by build-android (which links
          # the JNI shim against them with the NDK).
          - platform: android
            arch: arm64
            zig_target: aarch64-linux-android
          - platform: android
            arch: x86_64
            zig_target: x86_64-linux-android
          # WebAssembly reactor module (bin/jd.wasm), consumed by bindings/javascript
          # and any browser/Node host.
          - platform: wasm
            arch: wasm32
            zig_target: wasm32-freestanding
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build libjd
        working-directory: core
        # Non-wasm targets build a static + dynamic lib; the wasm target builds
        # a reactor .wasm. All ship ReleaseFast.
        run: zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.zig_target }}

      - name: Stage libjd bundle
        shell: bash
        run: |
          set -euo pipefail
          out="dist/libjd-${{ matrix.platform }}-${{ matrix.arch }}"
          mkdir -p "$out"
          # Keeps zig-out's lib/ + bin/ split (DLLs live in bin/ on Windows).
          cp -R core/zig-out/. "$out/"
          cp -R core/include "$out/include"

      - name: Upload libjd bundle (for CLI/IME jobs)
        uses: actions/upload-artifact@v7
        with:
          name: libjd-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/libjd-${{ matrix.platform }}-${{ matrix.arch }}
          if-no-files-found: error

      - name: Package release archives
        shell: bash
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME}"
          platform="${{ matrix.platform }}"
          arch="${{ matrix.arch }}"
          bundle="dist/libjd-$platform-$arch"
          out_dir="$PWD/release"
          mkdir -p "$out_dir"
          stage="$(mktemp -d)"
          cp -R "$bundle/include" "$stage/include"

          if [[ "$platform" == "windows" ]]; then
            cp "$bundle/bin/jd.dll" "$bundle/lib/jd.lib" "$bundle/lib/jd_static.lib" "$stage/"
            ( cd "$stage" && zip -r -9 -q "$out_dir/libjd-$ver-windows-$arch.zip" . )
          elif [[ "$platform" == "ios" ]]; then
            # iOS ships only the static lib (no dynamic lib for the App Store sandbox).
            cp "$bundle/lib/libjd.a" "$stage/"
            tar -cf - -C "$stage" libjd.a include | XZ_OPT=-e9 xz -c > "$out_dir/libjd-$ver-ios-$arch.a.tar.xz"
          elif [[ "$platform" == "android" ]]; then
            # Android ships only the dynamic lib: the static archive is built
            # with local-exec TLS that ld.lld rejects inside a shared object
            # (see android/scripts/build-libjd.sh), so it's a footgun there.
            cp "$bundle/lib/libjd.so" "$stage/"
            tar -cf - -C "$stage" libjd.so include | XZ_OPT=-e9 xz -c > "$out_dir/libjd-$ver-android-$arch.so.tar.xz"
          elif [[ "$platform" == "wasm" ]]; then
            # A single self-contained reactor module; ship it alongside include/
            # (the C ABI it exports) as one archive. No arch split — wasm32 is
            # the only slice, so the asset name drops $arch.
            cp "$bundle/bin/jd.wasm" "$stage/"
            tar -cf - -C "$stage" jd.wasm include | XZ_OPT=-e9 xz -c > "$out_dir/libjd-$ver-wasm.wasm.tar.xz"
          else
            case "$platform" in
              linux) dyn="libjd.so";    dynext="so"    ;;
              macos) dyn="libjd.dylib"; dynext="dylib" ;;
            esac
            cp "$bundle/lib/$dyn" "$bundle/lib/libjd.a" "$stage/"
            # XZ_OPT=-e9 → xz extreme preset, level 9 (smallest output).
            tar -cf - -C "$stage" "$dyn"  include | XZ_OPT=-e9 xz -c > "$out_dir/libjd-$ver-$platform-$arch.$dynext.tar.xz"
            tar -cf - -C "$stage" libjd.a include | XZ_OPT=-e9 xz -c > "$out_dir/libjd-$ver-$platform-$arch.a.tar.xz"
          fi
          ls -l "$out_dir"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" -R "${{ github.repository }}" release/* --clobber

  # One CLI build per Rust target. Each downloads the matching prebuilt libs
  # and statically links libjd into jd-cli. Packaged as a .tar.xz (Unix) or
  # .zip (Windows). Linux gnu and musl variants ship as distinct assets.
  build-cli:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    needs: build-libs
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            platform: linux
            arch: x86_64
            suffix: -gnu
            os: linux
            use_cross: true
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            platform: linux
            arch: x86_64
            suffix: -musl
            os: linux
            use_cross: true
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            platform: linux
            arch: arm64
            suffix: -gnu
            os: linux
            use_cross: true
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            platform: linux
            arch: arm64
            suffix: -musl
            os: linux
            use_cross: true
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            platform: macos
            arch: x86_64
            os: macos
            use_cross: false
          - target: aarch64-apple-darwin
            runner: macos-15
            platform: macos
            arch: arm64
            os: macos
            use_cross: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            platform: windows
            arch: x86_64
            os: windows
            use_cross: false
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            platform: windows
            arch: arm64
            os: windows
            use_cross: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Download prebuilt libs
        uses: actions/download-artifact@v8
        with:
          name: libjd-${{ matrix.platform }}-${{ matrix.arch }}
          path: prebuilt-libs

      - name: Build CLI (cross)
        if: matrix.use_cross
        working-directory: cli
        env:
          LIBJD_PATH: ${{ github.workspace }}/prebuilt-libs/lib
        run: cross build --release --target ${{ matrix.target }}

      - name: Build CLI (cargo)
        if: ${{ !matrix.use_cross }}
        working-directory: cli
        env:
          LIBJD_PATH: ${{ github.workspace }}/prebuilt-libs/lib
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage CLI binary
        shell: bash
        run: |
          set -euo pipefail
          out="dist/jd-cli-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.suffix }}"
          mkdir -p "$out"
          if [[ "${{ matrix.os }}" == "windows" ]]; then
            cp cli/target/${{ matrix.target }}/release/jd-cli.exe "$out/"
          else
            cp cli/target/${{ matrix.target }}/release/jd-cli     "$out/"
          fi

      - name: Package release archive (Unix)
        if: matrix.os != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME}"
          stage="jd-cli-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.suffix }}"
          asset="jd-cli-$ver-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.suffix }}"
          mkdir -p release
          tar -cf - -C "dist/$stage" jd-cli | XZ_OPT=-e9 xz -c > "release/$asset.tar.xz"

      - name: Package release archive (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $ver = $env:GITHUB_REF_NAME
          $stage = "jd-cli-${{ matrix.platform }}-${{ matrix.arch }}"
          $asset = "jd-cli-$ver-${{ matrix.platform }}-${{ matrix.arch }}"
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive -Path "dist/$stage/jd-cli.exe" -DestinationPath "release/$asset.zip" -Force

      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" -R "${{ github.repository }}" release/* --clobber

  # One IME build per Windows Rust target. Shipped as a .zip containing the
  # IME DLL plus the register/unregister .bat helpers.
  build-windows-ime:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    needs: build-libs
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            arch: x86_64
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          targets: ${{ matrix.target }}

      - name: Download prebuilt libs
        uses: actions/download-artifact@v8
        with:
          name: libjd-windows-${{ matrix.arch }}
          path: prebuilt-libs

      - name: Build IME
        working-directory: windows
        env:
          LIBJD_PATH: ${{ github.workspace }}/prebuilt-libs/lib
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage IME bundle
        shell: bash
        run: |
          set -euo pipefail
          out="dist/jd-ime-windows-${{ matrix.arch }}"
          mkdir -p "$out"
          cp windows/target/${{ matrix.target }}/release/ime_jd.dll "$out/"
          cp windows/register.bat   "$out/"
          cp windows/unregister.bat "$out/"

      - name: Package release archive
        shell: pwsh
        run: |
          $ver = $env:GITHUB_REF_NAME
          $stage = "jd-ime-windows-${{ matrix.arch }}"
          $asset = "jd-ime-$ver-windows-${{ matrix.arch }}"
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive -Path "dist/$stage/*" -DestinationPath "release/$asset.zip" -Force

      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" -R "${{ github.repository }}" release/* --clobber

  # One IME build per macOS arch, built natively on its own runner. The .pkg
  # installer produced by build-pkg.sh is shipped directly.
  build-macos-ime:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    needs: build-libs
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-15
            arch: arm64
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            arch: x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Download prebuilt libs
        uses: actions/download-artifact@v8
        with:
          name: libjd-macos-${{ matrix.arch }}
          path: prebuilt-libs

      - name: Build .pkg installer
        working-directory: macos
        run: scripts/build-pkg.sh --libjd "${{ github.workspace }}/prebuilt-libs/lib/libjd.a"

      - name: Package release archive
        shell: bash
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME}"
          mkdir -p release
          # build-pkg.sh emits exactly one jd-ime-macos-<arch>.pkg.
          cp macos/build/pkg/*.pkg "release/jd-ime-$ver-macos-${{ matrix.arch }}.pkg"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" -R "${{ github.repository }}" release/* --clobber

  # The iOS app + keyboard extension, packaged as an UNSIGNED .ipa. Reuses the
  # prebuilt device libjd from build-libs (LIBJD_A, exactly like build-macos-ime).
  # The .ipa is unsigned (public CI has no Apple signing credentials), so users
  # install it with a sideloading tool (AltStore / Sideloadly / TrollStore) that
  # re-signs with their own Apple ID — not by double-clicking.
  build-ios:
    name: ios .ipa
    runs-on: macos-26
    needs: build-libs
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Download prebuilt libs
        uses: actions/download-artifact@v8
        with:
          name: libjd-ios-arm64
          path: prebuilt-libs

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Build unsigned app (device)
        working-directory: ios
        shell: bash
        # The tag equals v<core/build.zig.zon version> (create-release fails
        # otherwise), so the tag drives the versions baked into the app:
        # CFBundleShortVersionString gets the full version and CFBundleVersion
        # the same numeric code scheme as build-android — monotonic across
        # releases for sideloading tools that compare build numbers.
        # project.yml's 0.0.0 stays the placeholder for plain IDE builds.
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME#v}"
          core="${ver%%[-+]*}"   # strip -prerelease/+build for the numeric code
          IFS=. read -r major minor patch <<<"$core"
          code=$((major * 10000 + minor * 100 + patch))
          xcodebuild build \
            -project JdIME-iOS.xcodeproj -scheme JdIME-iOS \
            -sdk iphoneos -configuration Release \
            -derivedDataPath build/DD \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            LIBJD_A="${{ github.workspace }}/prebuilt-libs/lib/libjd.a" \
            MARKETING_VERSION="$ver" CURRENT_PROJECT_VERSION="$code"

      - name: Package unsigned .ipa
        shell: bash
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME}"
          app="ios/build/DD/Build/Products/Release-iphoneos/JdIME.app"
          mkdir -p release ipa/Payload
          cp -R "$app" ipa/Payload/
          ( cd ipa && zip -r -9 -q "$GITHUB_WORKSPACE/release/jd-ime-$ver-ios.ipa" Payload )

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" -R "${{ github.repository }}" release/* --clobber

  # Android app + IME service, one APK per ABI (arm64-v8a + x86_64). Reuses
  # the prebuilt engine slices from build-libs via the script's LIBJD_SO_DIR
  # fast-path (like build-ios's LIBJD_A); only the JNI shim is linked here,
  # by the NDK, so the job needs no zig. The APKs' versionName/Code come
  # from the tag (which create-release verified against core/build.zig.zon).
  #
  # Android refuses to install unsigned APKs, so the assets are signed with
  # the keystore from repo secrets:
  #   ANDROID_SIGNING_KEYSTORE — base64 of a .jks holding ONE key
  #                              (apksigner then needs no alias)
  #   ANDROID_SIGNING_PASSWORD — its store/key password
  # Until those are configured, the job falls back to an ephemeral
  # CI-generated key with a warning: the APKs install fine, but every
  # release gets a different signature, so users must uninstall to upgrade.
  build-android:
    name: android .apk
    runs-on: ubuntu-latest
    needs: build-libs
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Download prebuilt engine (arm64)
        uses: actions/download-artifact@v8
        with:
          name: libjd-android-arm64
          path: prebuilt-raw/arm64

      - name: Download prebuilt engine (x86_64)
        uses: actions/download-artifact@v8
        with:
          name: libjd-android-x86_64
          path: prebuilt-raw/x86_64

      - name: Stage engines by ABI
        shell: bash
        # build-libjd.sh expects LIBJD_SO_DIR/<abi>/libjd.so, keyed by the
        # Android ABI names rather than the artifact arch names.
        run: |
          set -euo pipefail
          mkdir -p prebuilt/arm64-v8a prebuilt/x86_64
          cp prebuilt-raw/arm64/lib/libjd.so  prebuilt/arm64-v8a/
          cp prebuilt-raw/x86_64/lib/libjd.so prebuilt/x86_64/

      - name: Build release APKs
        working-directory: android
        shell: bash
        env:
          LIBJD_SO_DIR: ${{ github.workspace }}/prebuilt
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME#v}"
          core="${ver%%[-+]*}"   # strip -prerelease/+build for the numeric code
          IFS=. read -r major minor patch <<<"$core"
          code=$((major * 10000 + minor * 100 + patch))
          ./gradlew assembleRelease -PjdVersionName="$ver" -PjdVersionCode="$code"

      - name: Sign APKs
        shell: bash
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_SIGNING_KEYSTORE }}
          KEYSTORE_PASS: ${{ secrets.ANDROID_SIGNING_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -n "${KEYSTORE_B64:-}" ]; then
            printf '%s' "$KEYSTORE_B64" | base64 -d > signing.jks
            pass="$KEYSTORE_PASS"
          else
            echo "::warning::ANDROID_SIGNING_KEYSTORE secret not set — signing" \
              "with an ephemeral key; users must uninstall to upgrade across releases."
            keytool -genkeypair -keystore signing.jks -storepass ci-ephemeral \
              -alias ci -dname "CN=ime-jd CI" -keyalg RSA -keysize 2048 -validity 10000
            pass=ci-ephemeral
          fi
          bt=$(printf '%s\n' "$ANDROID_HOME"/build-tools/* | sort -V | tail -1)
          mkdir -p release
          for pair in "arm64-v8a:arm64" "x86_64:x86_64"; do
            abi="${pair%%:*}" arch="${pair##*:}"
            unsigned="android/app/build/outputs/apk/release/app-$abi-release-unsigned.apk"
            "$bt/zipalign" -f 4 "$unsigned" "aligned-$abi.apk"
            # --v4-signing-enabled false: v4 emits a detached <apk>.idsig used
            # only for incremental `adb install`, useless for a downloaded APK.
            # Without this, apksigner writes it next to --out and the upload
            # glob below publishes it as a stray release asset. v2/v3 (embedded)
            # stay on by default and are what installs actually verify.
            "$bt/apksigner" sign --ks signing.jks --ks-pass "pass:$pass" \
              --v4-signing-enabled false \
              --out "release/jd-ime-${GITHUB_REF_NAME}-android-$arch.apk" "aligned-$abi.apk"
          done

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        # Scope to *.apk (not release/*): this is the one job whose signing
        # tool writes sibling files, and apksigner's v4 default has drifted
        # across build-tools versions — pin the asset set to APKs so a future
        # default flip can't leak a stray .idsig again.
        run: gh release upload "${GITHUB_REF_NAME}" -R "${{ github.repository }}" release/*.apk --clobber
