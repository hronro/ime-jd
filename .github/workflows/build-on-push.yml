name: Build Libraries and Executables On Push

on:
  push:
    branches: [master]

jobs:
  # Zig cross-compiles everything from one x86_64 Linux runner. libjd doesn't
  # link libc, so one Linux build per arch covers both glibc and musl CLI
  # variants — no need to split.
  build-libs:
    name: libs ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            arch: x86_64
            zig_target: x86_64-linux
          - platform: linux
            arch: arm64
            zig_target: aarch64-linux
          - platform: macos
            arch: x86_64
            zig_target: x86_64-macos.12.0
          - platform: macos
            arch: arm64
            zig_target: aarch64-macos.12.0
          - platform: windows
            arch: x86_64
            zig_target: x86_64-windows-msvc
          - platform: windows
            arch: arm64
            zig_target: aarch64-windows-msvc
          # iOS device slice, consumed by build-ios to link the .ipa.
          - platform: ios
            arch: arm64
            zig_target: aarch64-ios.13.0
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build static + dynamic libraries
        working-directory: core
        run: zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.zig_target }}

      - name: Stage libjd bundle
        shell: bash
        run: |
          set -euo pipefail
          out="dist/libjd-${{ matrix.platform }}-${{ matrix.arch }}"
          mkdir -p "$out"
          # Keeps zig-out's lib/ + bin/ split (DLLs live in bin/ on Windows).
          cp -R core/zig-out/. "$out/"
          cp -R core/include "$out/include"

      - name: Upload libjd bundle
        uses: actions/upload-artifact@v7
        with:
          name: libjd-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/libjd-${{ matrix.platform }}-${{ matrix.arch }}
          if-no-files-found: error

  # One CLI build per Rust target. Each downloads the matching prebuilt libs
  # and statically links libjd into jd-cli. Linux gnu and musl variants share
  # the same libjd.a (it's libc-free) but ship as distinct artifacts.
  build-cli:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    needs: build-libs
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            platform: linux
            arch: x86_64
            suffix: -gnu
            os: linux
            use_cross: true
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            platform: linux
            arch: x86_64
            suffix: -musl
            os: linux
            use_cross: true
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            platform: linux
            arch: arm64
            suffix: -gnu
            os: linux
            use_cross: true
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            platform: linux
            arch: arm64
            suffix: -musl
            os: linux
            use_cross: true
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            platform: macos
            arch: x86_64
            os: macos
            use_cross: false
          - target: aarch64-apple-darwin
            runner: macos-15
            platform: macos
            arch: arm64
            os: macos
            use_cross: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            platform: windows
            arch: x86_64
            os: windows
            use_cross: false
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            platform: windows
            arch: arm64
            os: windows
            use_cross: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Download prebuilt libs
        uses: actions/download-artifact@v8
        with:
          name: libjd-${{ matrix.platform }}-${{ matrix.arch }}
          path: prebuilt-libs

      - name: Build CLI (cross)
        if: matrix.use_cross
        working-directory: cli
        env:
          LIBJD_PATH: ${{ github.workspace }}/prebuilt-libs/lib
        run: cross build --release --target ${{ matrix.target }}

      - name: Build CLI (cargo)
        if: ${{ !matrix.use_cross }}
        working-directory: cli
        env:
          LIBJD_PATH: ${{ github.workspace }}/prebuilt-libs/lib
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage CLI binary
        shell: bash
        run: |
          set -euo pipefail
          out="dist/jd-cli-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.suffix }}"
          mkdir -p "$out"
          if [[ "${{ matrix.os }}" == "windows" ]]; then
            cp cli/target/${{ matrix.target }}/release/jd-cli.exe "$out/"
          else
            cp cli/target/${{ matrix.target }}/release/jd-cli     "$out/"
          fi

      - name: Upload CLI binary
        uses: actions/upload-artifact@v7
        with:
          name: jd-cli-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.suffix }}
          path: dist/jd-cli-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.suffix }}
          if-no-files-found: error

  # One IME build per Windows Rust target. Reuses the prebuilt libjd bundle
  # matching the target arch — jd-windows links jd_static.lib the same way
  # jd-cli does, via LIBJD_PATH.
  build-windows-ime:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    needs: build-libs
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            arch: x86_64
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          targets: ${{ matrix.target }}

      - name: Download prebuilt libs
        uses: actions/download-artifact@v8
        with:
          name: libjd-windows-${{ matrix.arch }}
          path: prebuilt-libs

      - name: Build IME
        working-directory: windows
        env:
          LIBJD_PATH: ${{ github.workspace }}/prebuilt-libs/lib
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage IME DLL
        shell: bash
        run: |
          set -euo pipefail
          out="dist/jd-ime-windows-${{ matrix.arch }}"
          mkdir -p "$out"
          cp windows/target/${{ matrix.target }}/release/jd_ime.dll "$out/"
          cp windows/register.bat   "$out/"
          cp windows/unregister.bat "$out/"

      - name: Upload IME bundle
        uses: actions/upload-artifact@v7
        with:
          name: jd-ime-windows-${{ matrix.arch }}
          path: dist/jd-ime-windows-${{ matrix.arch }}
          if-no-files-found: error

  # One IME build per macOS arch, built natively on its own runner. Reuses the
  # prebuilt libjd matching the target arch:
  # build-pkg.sh links it via --libjd instead of rebuilding with zig, so the
  # job needs only xcodegen. build-pkg.sh builds for the runner's native arch by default.
  build-macos-ime:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    needs: build-libs
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-15
            arch: arm64
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            arch: x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Download prebuilt libs
        uses: actions/download-artifact@v8
        with:
          name: libjd-macos-${{ matrix.arch }}
          path: prebuilt-libs

      - name: Build .pkg installer
        working-directory: macos
        run: scripts/build-pkg.sh --libjd "${{ github.workspace }}/prebuilt-libs/lib/libjd.a"

      - name: Stage .pkg installer
        shell: bash
        run: |
          set -euo pipefail
          out="dist/jd-ime-macos-${{ matrix.arch }}"
          mkdir -p "$out"
          cp macos/build/pkg/*.pkg "$out/"

      - name: Upload IME installer
        uses: actions/upload-artifact@v7
        with:
          name: jd-ime-macos-${{ matrix.arch }}
          path: dist/jd-ime-macos-${{ matrix.arch }}
          if-no-files-found: error

  # iOS app + keyboard extension, reusing the prebuilt device libjd from build-libs
  # (LIBJD_A, like build-macos-ime / build-windows-ime) to link an UNSIGNED .ipa,
  # uploaded as a workflow artifact. (A signed build needs Apple credentials, out of
  # CI scope; the .ipa installs via a sideloading tool that re-signs.)
  build-ios:
    name: ios .ipa
    runs-on: macos-15
    needs: build-libs
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Download device libjd
        uses: actions/download-artifact@v8
        with:
          name: libjd-ios-arm64
          path: prebuilt-device

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Build unsigned app (device)
        working-directory: ios
        run: >
          xcodebuild build
          -project JdIME-iOS.xcodeproj -scheme JdIME-iOS
          -sdk iphoneos -configuration Release
          -derivedDataPath build/DD
          CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""
          LIBJD_A="$GITHUB_WORKSPACE/prebuilt-device/lib/libjd.a"

      - name: Package .ipa
        shell: bash
        run: |
          set -euo pipefail
          app="ios/build/DD/Build/Products/Release-iphoneos/JdIME.app"
          mkdir -p dist ipa/Payload
          cp -R "$app" ipa/Payload/
          ( cd ipa && zip -r -9 -q "$GITHUB_WORKSPACE/dist/jd-ime-ios.ipa" Payload )

      - name: Upload .ipa
        uses: actions/upload-artifact@v7
        with:
          name: jd-ime-ios-ipa
          path: dist/jd-ime-ios.ipa
          if-no-files-found: error
