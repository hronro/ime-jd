<!DOCTYPE html>
<html lang="zh-Hans">
<head><meta charset="utf-8"></head>
<body style="font-family: -apple-system, sans-serif; padding: 1em; line-height: 1.6;">
    <h2>即将完成</h2>

    <p><b>从旧版本升级？</b>无需其他操作——新版本已经生效。</p>

    <p><b>首次安装键道？</b>macOS 仅在登录会话开始时扫描新的输入法，
       因此你需要先<b>注销并重新登录</b>（或重启 Mac），「键道」才会出现。
       然后按以下步骤添加：</p>

    <ol>
        <li>打开<b>「系统设置」</b>→<b>「键盘」</b>。</li>
        <li>在<i>「文字输入」</i>的<i>「输入法」</i>一栏，点按<b>「编辑…」</b>。</li>
        <li>点按<b>「+」</b>，在<i>「简体中文」</i>下找到<b>「键道」</b>并添加。</li>
    </ol>

    <p>如果重新登录后仍未出现，请重启 Mac。添加后，从菜单栏的输入法菜单中选择
       <b>「键道」</b>（或按 <b>⌃Space</b> / <b>⌃⌥Space</b>）即可开始输入。</p>
</body>
</html>
