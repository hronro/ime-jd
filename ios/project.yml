name: JdIME-iOS
options:
  bundleIdPrefix: com.hronro
  deploymentTarget:
    iOS: "13.0"          # floor for clean dark-mode theming (userInterfaceStyle)
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    # Placeholders — the release workflow overrides both at build time:
    # MARKETING_VERSION with the tag's version (== core/build.zig.zon's
    # `.version`, matching the macOS flow) and CURRENT_PROJECT_VERSION with
    # build-android's numeric code scheme. Plain Xcode/IDE builds keep 0.0.0.
    MARKETING_VERSION: "0.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "13.0"
    TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad
    # The "Build libjd" Run Script Phase shells out to `zig` and reads ../core;
    # script sandboxing would block both. Keep it off (also what CI relies on).
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  JdIME-iOS:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes:
          - "Info.plist"
      # Compile the shared engine + keyboard UI into the app too, so the in-app
      # preview drives the exact same KeyboardView/InputSession as the extension.
      - path: Keyboard/Engine
      - path: Keyboard/UI
      - path: ../bindings/swift
        includes:
          - "*.swift"
    settings:
      base:
        INFOPLIST_FILE: App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.hronro.ime-jd
        PRODUCT_NAME: JdIME
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_INCLUDE_PATHS: "$(SRCROOT)/../core/include"
        LIBRARY_SEARCH_PATHS: "$(DERIVED_FILE_DIR)/libjd-thin"
        OTHER_LDFLAGS: "-ljd"
    preBuildScripts:
      - name: Build libjd
        script: |
          set -e
          bash "$SRCROOT/scripts/build-libjd.sh"
        outputFiles:
          - "$(DERIVED_FILE_DIR)/libjd-thin/libjd.a"
    dependencies:
      - target: JdKeyboard
        embed: true

  JdKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: Keyboard
        excludes:
          - "Info.plist"
      # Engine FFI wrapper shared with the macOS frontend (source-level, no
      # package) — Engine / QuerySnapshot / KeyAction.
      - path: ../bindings/swift
        includes:
          - "*.swift"
    settings:
      base:
        INFOPLIST_FILE: Keyboard/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.hronro.ime-jd.keyboard
        PRODUCT_NAME: JdKeyboard
        # libjd: header/modulemap (`import Libjd`) + the thin static lib produced
        # per-platform by the prebuild script. Mirrors the macOS target.
        SWIFT_INCLUDE_PATHS: "$(SRCROOT)/../core/include"
        LIBRARY_SEARCH_PATHS: "$(DERIVED_FILE_DIR)/libjd-thin"
        OTHER_LDFLAGS: "-ljd"
    preBuildScripts:
      - name: Build libjd
        script: |
          set -e
          bash "$SRCROOT/scripts/build-libjd.sh"
        outputFiles:
          - "$(DERIVED_FILE_DIR)/libjd-thin/libjd.a"

  # Hostless logic tests: compile the engine + session + keyboard UI sources
  # directly and link libjd, so InputSession dispatch and theme resolution are
  # verified without the keyboard-enable flow.
  JdKeyboardTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: KeyboardTests
      - path: Keyboard/Engine
      - path: Keyboard/UI
      - path: ../bindings/swift
        includes:
          - "*.swift"
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.hronro.ime-jd.keyboard.tests
        SWIFT_INCLUDE_PATHS: "$(SRCROOT)/../core/include"
        LIBRARY_SEARCH_PATHS: "$(DERIVED_FILE_DIR)/libjd-thin"
        OTHER_LDFLAGS: "-ljd"
    preBuildScripts:
      - name: Build libjd
        script: |
          set -e
          bash "$SRCROOT/scripts/build-libjd.sh"
        outputFiles:
          - "$(DERIVED_FILE_DIR)/libjd-thin/libjd.a"

  # QA-only UI test driver (NOT in the CI test scheme): performs the two
  # tap-requiring steps simctl can't — enabling 键道 in Settings and switching
  # to it via the globe — so the real extension can be exercised and
  # screenshotted. See KeyboardUITests/KeyboardExtensionQA.swift.
  JdKeyboardUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: KeyboardUITests
    dependencies:
      - target: JdIME-iOS
    settings:
      base:
        TEST_TARGET_NAME: JdIME-iOS
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.hronro.ime-jd.keyboard.uitests

schemes:
  JdIME-iOS:
    build:
      targets:
        JdIME-iOS: all
        JdKeyboardTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - JdKeyboardTests
    archive:
      config: Release

  # Extension-context QA (manual): xcodebuild test -scheme JdKeyboardQA …
  JdKeyboardQA:
    build:
      targets:
        JdIME-iOS: all
        JdKeyboardUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - JdKeyboardUITests
